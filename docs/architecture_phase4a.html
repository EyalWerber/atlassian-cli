<!-- ══ DESIGN DECISIONS (y=592-878) ══ -->
<rect x="66" y="592" width="688" height="286" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
<text x="410" y="614" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold" font-family="'Segoe UI',sans-serif">Design Decisions</text>

<!-- Decision 1: Atomic Write -->
<rect x="78" y="624" width="664" height="78" rx="6" fill="#0d1117" stroke="#ffa657" stroke-width="1"/>
<text x="90" y="642" fill="#ffa657" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">① Atomic Write Pattern  —  no orphaned records</text>
<text x="90" y="659" fill="#8b949e" font-size="10" font-family="monospace">embed(text)  →  SQLite INSERT (uncommitted)  →  ChromaDB upsert  →  SQLite commit</text>
<text x="90" y="675" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">If Ollama is down: nothing is written (embed fails first). If ChromaDB fails: SQLite never commits.</text>
<text x="90" y="691" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">Result: both stores are always consistent, or neither has the record.</text>

<!-- Decision 2: Stale Vector Safety -->
<rect x="78" y="710" width="664" height="62" rx="6" fill="#0d1117" stroke="#bc8cff" stroke-width="1"/>
<text x="90" y="728" fill="#bc8cff" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">② Stale Vector Safety  —  delete() is best-effort on ChromaDB</text>
<text x="90" y="745" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">SQLite delete is authoritative. ChromaDB removal is wrapped in try/except (harmless if it fails).</text>
<text x="90" y="761" fill="#8b949e" font-size="10" font-family="monospace">search(): [m for id in ids if (m := self.get(id)) is not None]  →  stale vectors auto-filtered</text>

<!-- Decision 3: SQLite-only reads -->
<rect x="78" y="780" width="664" height="46" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
<text x="90" y="798" fill="#58a6ff" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">③ SQLite-only for  list / show / get</text>
<text x="90" y="815" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">Read-only commands never call Ollama. Works offline. Only  add  and  search  require Ollama.</text>

<!-- Decision 4: ChromaDB n_results guard -->
<rect x="78" y="834" width="664" height="32" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text x="90" y="851" fill="#8b949e" font-size="10" font-family="monospace">n = min(limit, collection.count())  →  prevents ChromaDB error when fewer docs than requested</text>
<text x="90" y="862" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">Plus try/except around filtered queries (ChromaDB throws when filtered result set is empty).</text>
