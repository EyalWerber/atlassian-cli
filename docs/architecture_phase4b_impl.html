<!-- ══ DESIGN DECISIONS (x=66, y=570, w=680, h=294) ══ -->
<rect x="66" y="570" width="680" height="294" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

<!-- Decision 1 -->
<rect x="78" y="602" width="656" height="60" rx="5" fill="#0d1117" stroke="#ffa657" stroke-width="1"/>
<text x="90" y="620" fill="#ffa657" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">① Best-effort memory saves — primary operation always succeeds</text>
<text x="90" y="636" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">Wrapping MemoryStore.add() in try/except means Ollama being down never blocks bug filing</text>
<text x="90" y="650" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">or ADR creation. Same pattern for both qa bug and adr add. Warning printed, not exit 1.</text>

<!-- Decision 2 -->
<rect x="78" y="670" width="656" height="48" rx="5" fill="#0d1117" stroke="#39d353" stroke-width="1"/>
<text x="90" y="688" fill="#39d353" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">② ConfluenceClient reused without modification</text>
<text x="90" y="704" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">_adr_to_confluence_body() lives in commands/adr.py — ADR-specific HTML stays with the command, not in confluence.py.</text>

<!-- Decision 3 -->
<rect x="78" y="726" width="656" height="48" rx="5" fill="#0d1117" stroke="#bc8cff" stroke-width="1"/>
<text x="90" y="744" fill="#bc8cff" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">③ MemoryStore reused as-is from Phase 4a</text>
<text x="90" y="760" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">No changes to memory_store.py. Phase 4b just adds two new callers (adr add, qa bug). Type system handles diversity.</text>

<!-- Decision 4 -->
<rect x="78" y="782" width="656" height="70" rx="5" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<text x="90" y="800" fill="#8b949e" font-size="11" font-weight="bold" font-family="'Segoe UI',sans-serif">④ ADR status lifecycle</text>
<text x="90" y="816" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">AdrStatus is a string enum: proposed → accepted → deprecated | superseded.</text>
<text x="90" y="830" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">No automatic transitions — humans update status via: atlassian adr add --title "..." --status accepted</text>
<text x="90" y="844" fill="#6e7681" font-size="10" font-family="'Segoe UI',sans-serif">(delete old ADR + add new, or future adr update command in Phase 4c)</text>
